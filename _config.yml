title: 'Blog.geekslist.net'
author: 's-hubert'
description: 'Thinking and talking about compute, collaboration and corporation in the realm of software developement.'

# Email / Social media user names used by the minima theme:
# All of these are optional and can be removed or commented out
#email: "example@mail.com"
#twitter_username: "twitteruser"
github_username: 's-hubert'
#linkedin_username: "linkedinuser"
#facebook_username: username
#flickr_username: username
#instagram_username: username
#pinterest_username: username
#youtube_username: username
#googleplus_username: +username

#########################################################################################
######### Nothing below needs to be changed (unless you know what you're doing) #########
#########################################################################################
theme: 'minima'

rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true

plugins:
  - jekyll-feed
  - jekyll-sitemap

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ''
      type: post
    values:
      tags: [Other]

minima:
  show_excerpts: true

giscus:
  enabled: true
  repo: 's-hubert/s-hubert.github.io'
  # Fill these IDs from https://giscus.app/ after selecting the repository and discussion category.
  repo_id: 'R_kgDOQKJZnQ'
  category: 'Announcements'
  category_id: 'DIC_kwDOQKJZnc4C31Uy'
  mapping: 'title'
  strict: '0'
  reactions_enabled: '1'
  emit_metadata: '0'
  input_position: 'top'
  theme: 'light'
  lang: 'en'
  loading: 'lazy'
